name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: jdx/mise-action@v4.0.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm fmt --check
      - run: pnpm lint
